<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL DO SOCORRO - PAINEL ADM</title>
    <style>
        :root { --amarelo: #ffcc00; --preto: #000; --cinza: #1a1a1a; --verde: #25d366; }
        body { background: var(--preto); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: var(--amarelo); margin: 0; }
        .btn-config { background: #444; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #modalConfig { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 30px; border-radius: 15px; border: 2px solid var(--amarelo); z-index: 100; width: 90%; max-width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .card-pedido { background: var(--cinza); border: 2px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 10px solid var(--amarelo); }
        .botoes-direcionar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .btn-zap { background: var(--verde); color: #fff; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        b { color: var(--amarelo); }
    </style>
</head>
<body>
    <div class="header-painel">
        <h1>📟 CENTRAL DO SOCORRO - ADM</h1>
        <button class="btn-config" onclick="abrirConfig()">⚙️ CONFIGURAR NÚMEROS</button>
    </div>
    <div id="lista">Aguardando novos pedidos do site...</div>

    <div class="overlay" id="overlay" onclick="fecharConfig()"></div>
    <div id="modalConfig">
        <h3>Configurar Atendentes</h3>
        <div id="listaContatosConfig"></div>
        <button class="btn-zap" style="background:#444; width:100%" onclick="adicionarCampoContato()">+ Adicionar Outro Número</button>
        <hr style="border: 1px solid #333; margin: 20px 0;">
        <button class="btn-zap" style="width:100%" onclick="salvarConfig()">✅ SALVAR E FECHAR</button>
    </div>

    <script>
        let configAtendentes = JSON.parse(localStorage.getItem('vampirao_contatos')) || [{ nome: "PRINCIPAL", numero: "5511992512161" }];
        
        function abrirConfig() { document.getElementById('modalConfig').style.display='block'; document.getElementById('overlay').style.display='block'; renderizarCamposConfig(); }
        function fecharConfig() { document.getElementById('modalConfig').style.display='none'; document.getElementById('overlay').style.display='none'; }
        
        function renderizarCamposConfig() {
            const container = document.getElementById('listaContatosConfig');
            container.innerHTML = '';
            configAtendentes.forEach((contato, index) => {
                container.innerHTML += `
                    <input type="text" placeholder="Nome" value="${contato.nome}" onchange="configAtendentes[${index}].nome=this.value">
                    <input type="text" placeholder="Número (ex: 5511...)" value="${contato.numero}" onchange="configAtendentes[${index}].numero=this.value">
                `;
            });
        }
        function adicionarCampoContato() { configAtendentes.push({ nome: "", numero: "" }); renderizarCamposConfig(); }
        function salvarConfig() { localStorage.setItem('vampirao_contatos', JSON.stringify(configAtendentes)); fecharConfig(); location.reload(); }

        const source = new EventSource('https://ntfy.sh/central_socorro_vampirao_ios/sse');
        source.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const p = JSON.parse(data.message);
            new Audio('https://www.myinstants.com/media/sounds/whatsapp-notification.mp3').play();

            const item = document.createElement('div');
            item.className = 'card-pedido';
            
            let msgBase = `🚨 *NOVO PEDIDO - CENTRAL DO SOCORRO*\n\n👤 *CLIENTE:* ${p.nome}\n📞 *CONTATO:* ${p.tel}\n🛠️ *SERVIÇO:* ${p.servico}\n🚗 *VEÍCULO:* ${p.veiculo}\n⚡ *AMP:* ${p.amp}\n📍 *ENDEREÇO:* ${p.endereco}\n🌎 *MAPA:* ${p.mapa}`;

            let botoesHtml = '';
            configAtendentes.forEach(c => {
                botoesHtml += `<a class="btn-zap" href="https://wa.me/${c.numero}?text=${encodeURIComponent(msgBase)}" target="_blank">ENVIAR PARA ${c.nome}</a>`;
            });

            item.innerHTML = `
                <p><b>👤 CLIENTE:</b> ${p.nome} | <b>📞 TEL:</b> ${p.tel}</p>
                <p><b>🛠️ SERVIÇO:</b> ${p.servico} | <b>🚗 VEÍCULO:</b> ${p.veiculo}</p>
                <p><b>📍 ENDEREÇO:</b> ${p.endereco}</p>
                <div class="botoes-direcionar">${botoesHtml}</div>
            `;
            
            const lista = document.getElementById('lista');
            if(lista.innerHTML.includes("Aguardando")) lista.innerHTML = "";
            lista.prepend(item);
        };
    </script>
</body>
</html>
